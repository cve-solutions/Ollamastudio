services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ollamastudio-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data          # SQLite + skills + templates
      - ./backend/workspace:/app/workspace # Workspace fichiers utilisateur
      - ./backend/documents:/app/documents # Documents importés
    environment:
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - WORKSPACE_ROOT=/app/workspace
      - DATA_DIR=/app/data
      - DOCUMENTS_DIR=/app/documents
      - CORS_ORIGINS=["http://localhost:5173","http://localhost:3000"]
      - SHELL_TIMEOUT=30
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ollamastudio-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PUBLIC_API_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy

volumes:
  workspace_data:
  app_data:
