services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ollamastudio-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data:z          # SQLite + skills + templates
      - ./backend/workspace:/app/workspace:z # Workspace fichiers utilisateur
      - ./backend/documents:/app/documents:z # Documents importés
      - /:/host:ro                           # Accès lecture seule au filesystem hôte → /host/...
    environment:
      - WORKSPACE_ROOT=/app/workspace
      - DATA_DIR=/app/data
      - DOCUMENTS_DIR=/app/documents
      - LOG_LEVEL=DEBUG
      - APP_VERSION=0.0.11
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "1", "--log-level", "debug"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ollamastudio-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8000
      - NODE_ENV=development
    depends_on:
      backend:
        condition: service_healthy

volumes:
  workspace_data:
  app_data:
