# ═══════════════════════════════════════════════════════════════════
# OllamaStudio — Configuration Nginx (reverse proxy + SSL)
#
# HTTP :80  → redirection vers HTTPS :443
# HTTPS :443 → proxy vers Node.js :3000 (frontend + API)
#
# Certificat : /etc/ollamastudio/ssl/ollamastudio.crt
# Clé privée : /etc/ollamastudio/ssl/ollamastudio.key
#
# Pour remplacer le certificat self-signed par un vrai certificat :
#   1. Remplacez les fichiers .crt et .key
#   2. sudo systemctl reload nginx
# ═══════════════════════════════════════════════════════════════════

# Redirection HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Let's Encrypt challenge (si utilisé plus tard)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — Proxy vers le frontend Node.js
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;

    # ── Certificats SSL ───────────────────────────────────────────
    ssl_certificate     /etc/ollamastudio/ssl/ollamastudio.crt;
    ssl_certificate_key /etc/ollamastudio/ssl/ollamastudio.key;

    # ── Paramètres SSL sécurisés ──────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── Headers de sécurité ───────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Limites ───────────────────────────────────────────────────
    client_max_body_size 50M;

    # ── Proxy vers Node.js frontend (port 3000) ──────────────────
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE (Server-Sent Events) pour le chat streaming
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── WebSocket pour le terminal ────────────────────────────────
    location /api/shell/ws {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Pas de timeout sur les WebSocket
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Assets statiques — cache long ─────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
